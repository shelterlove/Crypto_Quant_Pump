services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: crypto_quant
      POSTGRES_USER: crypto_quant
      POSTGRES_PASSWORD: crypto_quant
    ports:
      - "5439:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crypto_quant -d crypto_quant"]
      interval: 5s
      timeout: 3s
      retries: 20

  adminer:
    image: adminer:latest
    profiles: ["admin"]
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
