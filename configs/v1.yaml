# v1.0.0 configuration — complete strategy with all white-paper §5.4, §7.7, §9, §11 features enabled
extends: configs/default.yaml
strategy_version: v1.0.0
risk:
  trade_risk_pct: 0.01
  max_symbol_position_pct: 0.60
  max_positions: 3
  atr_period: 14
  atr_stop_multiple: 2.0
  # v1: breakeven at 2x ATR, trailing at 2x ATR (tuned from backtest data)
  enable_breakeven_stop: true
  breakeven_activation_atr_multiple: 2.0
  breakeven_buffer_bps: 0.0
  enable_trailing_stop: true
  trailing_activation_atr_multiple: 2.0
  trailing_stop_atr_multiple: 2.5
  defensive_tighten_existing_positions: true
  defensive_tighten_atr_multiple: 1.0
  # v1: volume confirmation disabled (backtest shows it filters out positive-alpha signals)
  volume_confirmation_enabled: false
  # v1: daily loss circuit breaker
  daily_loss_limit_pct: 0.08
  daily_loss_defensive_pct: 0.12
  consecutive_loss_pause_count: 8
  consecutive_loss_pause_hours: 1.0
  recent_trades_lookback: 15
  recent_trades_loss_threshold: 10
  # v1: volume-stall filter
  volume_stall_enabled: true
  volume_stall_lookback_bars: 6
  volume_stall_volume_lookback_hours: 20
  volume_stall_volume_ratio: 1.5
  volume_stall_min_bars_above: 4
  volume_stall_high_rejection_pct: 0.995
  volume_stall_return_threshold: 0.015
  volume_stall_drawdown_threshold: 0.015
  volume_stall_top_return_pct: 0.2
  cooldown_hours: 4.0
  # v1: position state machine
  weakening_reduction_pct: 0.33
  weakening_trailing_multiple: 1.5
  weakening_rank_threshold: 5
  weakening_rank_upper: 15
  weakening_drawdown_atr_multiple: 1.5
trend:
  enabled: true
  ma_short_period: 20
  ma_long_period: 20
  score_weight: 0.25
  max_drawdown_from_24h_high: 0.05
volume_score:
  enabled: true
  score_weight: 0.25
  lookback_hours: 6
  average_hours: 20
false_breakout:
  enabled: true
  top_n: 10
  signal_window_hours: 24
  return_horizon_hours: 8
  negative_signal_threshold_pct: 0.5
  breadth_threshold: 0.4
  min_samples: 10
  single_risk_multiplier: 0.5
  max_positions: 1
  top_n_allowed: 2
pump_mode:
  enabled: true
  max_positions: 2
  trade_risk_pct: 0.05
  max_symbol_position_pct: 0.60
  max_total_exposure_pct: 1.00
  initial_stop_atr_multiple: 1.8
  min_24h_return: 0.18
  min_72h_return: 0.35
  min_6h_return: 0.10
  early_6h_return: 0.08
  min_quote_volume_24h: 2000000
  min_quote_volume_6h: 800000
  volume_ratio_min: 1.5
  early_volume_ratio_min: 1.8
  warm_early_6h_return: 0.12
  warm_early_volume_ratio_min: 2.0
  max_72h_return_full_risk: 0.80
  cooldown_minutes: 0
  adaptive_risk_enabled: false
  extended_cooldown_minutes: 0
  bad_b_ema_vr_risk_mid_enabled: true
  bad_b_vr30_reject_enabled: true
  bad_b_low_rm_reject_enabled: true
  mfe_protect_enabled: true
